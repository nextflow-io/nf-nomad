version: '3.9'

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
      - ./init-minio.sh:/usr/local/bin/init-minio.sh

  nomad:
    privileged: true
    cgroup: host
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    build:
      context: .
    ports:
      - "4646:4646"   # HTTP API + UI
      - "4647:4647"   # server RPC (single-node, mostly internal)
      - "4648:4648"   # serf (single-node, mostly internal)
    volumes:
      - type: bind
        source: /sys/fs/cgroup
        target: /sys/fs/cgroup
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - ./nomad-data:/data
      - ./init-nomad.sh:/usr/local/bin/init-nomad.sh
      - /tmp/nomad/nomad_temp/scratchdir/:/tmp/nomad/nomad_temp/scratchdir/:rw


